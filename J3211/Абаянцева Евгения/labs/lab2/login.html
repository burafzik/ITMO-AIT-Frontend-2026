<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему - OnlineLearning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<script src="js/api.js"></script>
	<script src="js/auth.js"></script>
	<link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
	<a href="#main-content" class="skip-link">
        Перейти к основному контенту
    </a>

    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-red">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold" href="index.html">
                <svg class="icon icon-sm"><use href="images/icons.svg#icon-logo"></use></svg> OnlineLearning
            </a>
            <div class="ms-auto">
                <span class="text-muted">Нет аккаунта?</span>
                <a href="register.html" class="btn btn-outline-primary ms-2 btn-sm">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header">
                <h3>С возвращением!</h3>
                <p class="mb-0 opacity-75">Войдите в свой аккаунт</p>
            </div>
            <div class="card-body p-4">
                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email адрес</label>
                        <input type="email" class="form-control" id="email" 
							   aria-required="true" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">
							Мы не передаём ваш email третьим лицам
						</div>
                        <div class="invalid-feedback" role="alert" aria-live="polite">
							Введите корректный email.
						</div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
								<svg class="icon icon-sm"><use href="images/icons.svg#icon-lock"></use></svg>
							</span>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" aria-required="true" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <svg class="icon icon-sm"><use href="images/icons.svg#icon-eye"></use></svg>
                            </button>
                            <div class="invalid-feedback">
                                Введите пароль.
                            </div>
                        </div>
                        <div class="text-end mt-1">
                            <a href="#" class="text-decoration-none small text-muted">Забыли пароль?</a>
                        </div>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small" for="rememberMe">Запомнить меня</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                        Войти <svg class="icon icon-sm ms-2"><use href="images/icons.svg#icon-arrow-right"></use></svg>
                    </button>
                </form>

                <div class="text-center mb-3">
                    <span class="text-muted small">или войдите через</span>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-google social-login-btn">
                        <svg class="icon icon-sm me-2"><use href="images/icons.svg#icon-google"></use></svg> Google
                    </button>
                    <button class="btn btn-vk social-login-btn">
                        <svg class="icon icon-sm me-2"><use href="images/icons.svg#icon-vk"></use></svg> VK
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white py-3 mt-auto border-top">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <p class="text-muted small mb-0">&copy; 2026 OnlineLearning. Все права защищены.</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <button id="themeToggle" class="btn btn-outline-secondary btn-sm" aria-label="Переключить тему" title="Переключить тему">
                        <svg class="icon icon-sm me-2"><use href="images/icons.svg#icon-moon"></use></svg>
                        <span id="themeText">Тёмная тема</span>
                    </button>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
	<script src="js/theme.js"></script>
</body>
</html>
