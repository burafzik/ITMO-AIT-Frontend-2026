<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему - OnlineLearning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-red">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold" href="index.html">
                <i class="bi bi-mortarboard-fill"></i> OnlineLearning
            </a>
            <div class="ms-auto">
                <span class="text-muted">Нет аккаунта?</span>
                <a href="register.html" class="btn btn-outline-primary ms-2 btn-sm">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header">
                <h3>С возвращением!</h3>
                <p class="mb-0 opacity-75">Войдите в свой аккаунт</p>
            </div>
            <div class="card-body p-4">
                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email адрес</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                            <div class="invalid-feedback">
                                Пожалуйста, введите корректный email.
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="bi bi-eye"></i>
                            </button>
                            <div class="invalid-feedback">
                                Введите пароль.
                            </div>
                        </div>
                        <div class="text-end mt-1">
                            <a href="#" class="text-decoration-none small text-muted">Забыли пароль?</a>
                        </div>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small" for="rememberMe">Запомнить меня</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                        Войти <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </form>

                <div class="text-center mb-3">
                    <span class="text-muted small">или войдите через</span>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-google social-login-btn">
                        <i class="bi bi-google"></i> Google
                    </button>
                    <button class="btn btn-vk social-login-btn">
                        <i class="bi bi-vk"></i> VK
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white py-3 mt-auto border-top">
        <div class="container text-center text-muted small">
            &copy; 2026 OnlineLearning. Все права защищены.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
